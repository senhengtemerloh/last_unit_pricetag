<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Last Unit A4 Tag Generator</title>
  <style>
    :root {
      --a4-w: 210mm;
      --a4-h: 297mm;
      --panel-top: 219.5mm;
      --grey: #e7e8ea;
      --ink: #000;
      --ui-bg: #f3f4f6;
      --ui-card: #ffffff;
      --ui-line: #d1d5db;
      --ui-text: #111827;
      --ui-muted: #6b7280;
      --accent: #111827;
      --danger: #b91c1c;
      --tag-font: Arial, Helvetica, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: var(--tag-font);
      background: var(--ui-bg);
      color: var(--ui-text);
    }

    .app {
      display: grid;
      grid-template-columns: 390px 1fr;
      min-height: 100vh;
    }

    .sidebar {
      padding: 18px;
      background: var(--ui-card);
      border-right: 1px solid var(--ui-line);
      overflow-y: auto;
    }

    h1 {
      font-size: 20px;
      margin: 0 0 4px;
      letter-spacing: -0.02em;
    }

    .hint {
      font-size: 13px;
      color: var(--ui-muted);
      margin: 0 0 18px;
      line-height: 1.4;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      margin: 13px 0 6px;
    }

    input,
    textarea,
    select {
      width: 100%;
      border: 1px solid var(--ui-line);
      border-radius: 10px;
      padding: 10px 11px;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 14px;
      outline: none;
      background: #fff;
    }

    textarea {
      resize: vertical;
      min-height: 66px;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: #111827;
      box-shadow: 0 0 0 3px rgba(17,24,39,0.08);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 16px;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 11px 12px;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .primary {
      background: var(--accent);
      color: #fff;
    }

    .secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .danger {
      background: #fee2e2;
      color: var(--danger);
    }

    .smallButton {
      padding: 7px 9px;
      font-size: 12px;
      border-radius: 8px;
    }

    .tagList {
      margin-top: 18px;
      border-top: 1px solid var(--ui-line);
      padding-top: 14px;
    }

    .tagList h2 {
      font-size: 15px;
      margin: 0 0 8px;
    }

    .tagItem {
      border: 1px solid var(--ui-line);
      border-radius: 12px;
      padding: 10px;
      margin-bottom: 9px;
      background: #fff;
    }

    .tagItem strong {
      display: block;
      font-size: 13px;
      margin-bottom: 3px;
    }

    .tagItem span {
      display: block;
      font-size: 12px;
      color: var(--ui-muted);
      margin-bottom: 8px;
    }

    .tagActions {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
    }

    .previewWrap {
      padding: 24px;
      overflow: auto;
    }

    .previewTop {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .previewTop h2 {
      margin: 0;
      font-size: 18px;
    }

    .previewTop p {
      margin: 3px 0 0;
      color: var(--ui-muted);
      font-size: 13px;
    }

    .zoomControl {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #fff;
      border: 1px solid var(--ui-line);
      border-radius: 12px;
      padding: 8px 10px;
      font-size: 13px;
      white-space: nowrap;
    }

    .zoomControl input {
      width: 130px;
      padding: 0;
    }

    .previewScaler {
      transform-origin: top left;
    }

    .page {
      width: var(--a4-w);
      height: var(--a4-h);
      position: relative;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 12px 35px rgba(0,0,0,0.18);
      margin: 0 auto 24px;
      page-break-after: always;
      break-after: page;
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
    }

    .templateBg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
      pointer-events: none;
      user-select: none;
    }

    .printLayer {
      position: absolute;
      inset: 0;
      z-index: 1;
    }

    .greyPanel {
      position: absolute;
      left: 0;
      top: var(--panel-top);
      width: 210mm;
      height: 77.5mm;
      overflow: hidden;
    }

    .txt {
      position: absolute;
      color: #000;
      font-family: var(--tag-font);
      white-space: nowrap;
      line-height: 1;
    }

    /* Top title */
    .headline {
      left: 0;
      top: 2.8mm;
      width: 210mm;
      text-align: center;
      font-size: 45.5mm;
      font-weight: 900;
      letter-spacing: -1.45mm;
      transform: scaleX(1.00);
      transform-origin: top center;
      line-height: 0.92;
    }

    .headline .line2 {
      display: block;
      margin-top: 5.6mm;
    }

    /* Cashback area */
    .cashNumber {
      left: 27mm;
      top: 116.8mm;
      width: 103mm;
      text-align: left;
      font-size: 74.5mm;
      font-weight: 900;
      letter-spacing: -2.9mm;
      line-height: 0.9;
      transform: scaleX(1.02);
      transform-origin: left top;
    }

    .percentSymbol {
      left: 138mm;
      top: 116mm;
      font-size: 64mm;
      font-weight: 900;
      letter-spacing: -3mm;
      line-height: 0.9;
      transform: scaleX(0.96);
      transform-origin: left top;
    }

    .asterisk {
      left: 190mm;
      top: 126mm;
      font-size: 11mm;
      font-weight: 900;
      line-height: 1;
    }

    .scoinText {
      left: 137mm;
      top: 177.5mm;
      font-size: 12.8mm;
      font-weight: 900;
      letter-spacing: -0.35mm;
      line-height: 1;
    }

    .cashbackText {
      left: 137mm;
      top: 190.2mm;
      font-size: 9.6mm;
      font-weight: 900;
      letter-spacing: 0.65mm;
      line-height: 1;
    }

    /* Product info row */
    .modelLine {
      left: 8.2mm;
      top: 221.8mm;
      font-size: 4.6mm;
      font-weight: 400;
      letter-spacing: -0.1mm;
      max-width: 66mm;
      overflow: hidden;
      text-overflow: clip;
    }

    .descLine {
      left: 77.5mm;
      top: 221.8mm;
      font-size: 4.6mm;
      font-weight: 400;
      letter-spacing: -0.1mm;
      max-width: 127mm;
      overflow: hidden;
      text-overflow: clip;
    }

    /* Price area */
    .nowLabel {
      left: 14mm;
      top: 234.5mm;
      font-size: 17mm;
      font-weight: 900;
      letter-spacing: 1.4mm;
      line-height: 0.9;
    }

    .rmLabel {
      left: 14mm;
      top: 250.8mm;
      font-size: 17mm;
      font-weight: 900;
      letter-spacing: 1.15mm;
      line-height: 0.9;
    }

    .nowPrice {
      left: 70mm;
      top: 231.5mm;
      width: 132mm;
      text-align: left;
      font-size: 44mm;
      font-weight: 900;
      letter-spacing: -1.35mm;
      line-height: 0.9;
      transform-origin: left top;
    }

    .beforeLine {
      left: 14mm;
      top: 276.4mm;
      font-size: 5.8mm;
      font-weight: 400;
      letter-spacing: -0.1mm;
    }

    .termsLine {
      left: 5.5mm;
      top: 289.2mm;
      font-size: 2.45mm;
      font-weight: 700;
      letter-spacing: 0.05mm;
    }

    .printBook {
      display: none;
    }

    @page {
      size: A4 portrait;
      margin: 0;
    }

    @media print {
      html,
      body {
        width: 210mm;
        min-height: 297mm;
        margin: 0;
        background: white;
      }

      .app {
        display: none !important;
      }

      .printBook {
        display: block !important;
      }

      .page {
        margin: 0 !important;
        box-shadow: none !important;
        page-break-after: always;
        break-after: page;
      }

      .templateBg {
        display: none !important;
      }

      .printLayer,
      .greyPanel,
      svg,
      rect,
      .txt {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }
    }

    @media (max-width: 960px) {
      .app {
        grid-template-columns: 1fr;
      }

      .sidebar {
        border-right: 0;
        border-bottom: 1px solid var(--ui-line);
      }

      .previewWrap {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="sidebar">
      <h1>A4 Last Unit Tag Generator</h1>
      <p class="hint">Put <b>template_01.png</b> in the same folder as this index.html. The yellow/white template is only for preview. Printing outputs black text + grey panel only.</p>


      <label for="tagFont">Print Font</label>
      <select id="tagFont">
        <option value="Arial, Helvetica, sans-serif" selected>Arial - safest alignment</option>
        <option value="'Arial Narrow', Arial, Helvetica, sans-serif">Arial Narrow - compact</option>
        <option value="'Segoe UI', Arial, sans-serif">Segoe UI - clean modern</option>
        <option value="Calibri, Arial, sans-serif">Calibri - softer corporate</option>
        <option value="'Trebuchet MS', Arial, sans-serif">Trebuchet MS - bold readable</option>
      </select>

      <label for="model">Model</label>
      <input id="model" type="text" placeholder="Example: HSE-55Q6Q" autocomplete="off" />

      <label for="desc">Description <span style="font-weight:400;color:#6b7280;">(optional)</span></label>
      <textarea id="desc" placeholder='Example: 65" 4K UHD Smart LED TV (QLED, VIDAA OS)'></textarea>

      <div class="row">
        <div>
          <label for="percent">S-Coin Cashback %</label>
          <input id="percent" type="text" inputmode="numeric" placeholder="70" autocomplete="off" />
        </div>
        <div>
          <label for="nowPrice">Now Price</label>
          <input id="nowPrice" type="text" inputmode="decimal" placeholder="1999" autocomplete="off" />
        </div>
      </div>

      <label for="beforePrice">Before Price</label>
      <input id="beforePrice" type="text" inputmode="decimal" placeholder="2599" autocomplete="off" />

      <div class="buttons">
        <button class="secondary" id="clearFormBtn" type="button">Clear</button>
        <button class="primary" id="addBtn" type="button">Add Tag</button>
      </div>

      <div class="buttons">
        <button class="secondary" id="printCurrentBtn" type="button">Print Current</button>
        <button class="primary" id="printAllBtn" type="button">Print Added</button>
      </div>

      <section class="tagList">
        <h2>Added Tags: <span id="tagCount">0</span></h2>
        <div id="tagList"></div>
      </section>
    </section>

    <section class="previewWrap">
      <div class="previewTop">
        <div>
          <h2>Live Preview</h2>
          <p>Preview shows the pre-printed yellow/white paper plus printed layer.</p>
        </div>
        <div class="zoomControl">
          <span>Zoom</span>
          <input id="zoom" type="range" min="35" max="100" value="55" />
          <strong id="zoomValue">55%</strong>
        </div>
      </div>

      <div class="previewScaler" id="previewScaler">
        <div id="livePreview"></div>
      </div>
    </section>
  </main>

  <section class="printBook" id="printBook"></section>

  <template id="pageTemplate">
    <article class="page">
      <img class="templateBg" src="template_01.png" alt="" />
      <div class="printLayer">
        <svg class="greyPanel" viewBox="0 0 210 77.5" preserveAspectRatio="none" aria-hidden="true">
          <rect x="0" y="0" width="210" height="77.5" fill="#e7e8ea"></rect>
        </svg>

        <div class="txt headline">LAST<span class="line2">UNIT</span></div>

        <div class="txt cashNumber" data-field="percent"></div>
        <div class="txt percentSymbol">%</div>
        <div class="txt asterisk">*</div>
        <div class="txt scoinText">S-COIN</div>
        <div class="txt cashbackText">CASHBACK</div>

        <div class="txt modelLine" data-field="modelLine"></div>
        <div class="txt descLine" data-field="descLine"></div>

        <div class="txt nowLabel">NOW</div>
        <div class="txt rmLabel">RM</div>
        <div class="txt nowPrice" data-field="nowPrice"></div>
        <div class="txt beforeLine" data-field="beforeLine"></div>
        <div class="txt termsLine">*Conditional sale. For PlusOne® members only. Terms and conditions apply.</div>
      </div>
    </article>
  </template>

  <script>
    const els = {
      model: document.getElementById('model'),
      desc: document.getElementById('desc'),
      percent: document.getElementById('percent'),
      nowPrice: document.getElementById('nowPrice'),
      beforePrice: document.getElementById('beforePrice'),
      addBtn: document.getElementById('addBtn'),
      clearFormBtn: document.getElementById('clearFormBtn'),
      printCurrentBtn: document.getElementById('printCurrentBtn'),
      printAllBtn: document.getElementById('printAllBtn'),
      livePreview: document.getElementById('livePreview'),
      pageTemplate: document.getElementById('pageTemplate'),
      tagList: document.getElementById('tagList'),
      tagCount: document.getElementById('tagCount'),
      printBook: document.getElementById('printBook'),
      zoom: document.getElementById('zoom'),
      zoomValue: document.getElementById('zoomValue'),
      tagFont: document.getElementById('tagFont'),
      previewScaler: document.getElementById('previewScaler')
    };

    let tags = [];

    function cleanText(value) {
      return String(value || '').replace(/\s+/g, ' ').trim();
    }

    function cleanNumber(value) {
      return String(value || '')
        .replace(/rm/ig, '')
        .replace(/[^\d.]/g, '')
        .trim();
    }

    function formatPrice(value) {
      const cleaned = cleanNumber(value);
      if (!cleaned) return '';
      const num = Number(cleaned);
      if (!Number.isFinite(num)) return cleaned;
      return num.toLocaleString('en-MY', {
        maximumFractionDigits: cleaned.includes('.') ? 2 : 0,
        minimumFractionDigits: 0
      });
    }

    function getCurrentTag() {
      return {
        model: cleanText(els.model.value).toUpperCase(),
        desc: cleanText(els.desc.value),
        percent: cleanNumber(els.percent.value),
        nowPrice: formatPrice(els.nowPrice.value),
        beforePrice: formatPrice(els.beforePrice.value)
      };
    }

    function validateTag(tag) {
      const missing = [];
      if (!tag.model) missing.push('model');
      if (!tag.percent) missing.push('percentage');
      if (!tag.nowPrice) missing.push('now price');
      if (!tag.beforePrice) missing.push('before price');

      if (missing.length) {
        alert('Please insert: ' + missing.join(', '));
        return false;
      }
      return true;
    }

    function fitLongPrice(page) {
      const price = page.querySelector('[data-field="nowPrice"]');
      const value = price.textContent.trim();
      price.style.fontSize = '44mm';
      price.style.letterSpacing = '-1.35mm';

      if (value.length >= 6) {
        price.style.fontSize = '40mm';
        price.style.letterSpacing = '-1.45mm';
      }
      if (value.length >= 7) {
        price.style.fontSize = '36mm';
        price.style.letterSpacing = '-1.55mm';
      }
      if (value.length >= 8) {
        price.style.fontSize = '32mm';
        price.style.letterSpacing = '-1.65mm';
      }
    }

    function fitPercent(page) {
      const number = page.querySelector('[data-field="percent"]');
      const symbol = page.querySelector('.percentSymbol');
      const value = number.textContent.trim();

      number.style.fontSize = '78mm';
      number.style.letterSpacing = '-2.9mm';
      number.style.transform = 'scaleX(1.02)';
      symbol.style.left = '138mm';
      symbol.style.fontSize = '64mm';

      if (value.length >= 3) {
        number.style.fontSize = '60mm';
        number.style.letterSpacing = '-2.6mm';
        number.style.transform = 'scaleX(0.98)';
        symbol.style.left = '152mm';
        symbol.style.fontSize = '58mm';
      }
    }

    function fitDescription(page, descText) {
      const desc = page.querySelector('[data-field="descLine"]');
      desc.style.fontSize = '4.6mm';

      if (descText.length > 55) desc.style.fontSize = '4.1mm';
      if (descText.length > 70) desc.style.fontSize = '3.7mm';
      if (descText.length > 88) desc.style.fontSize = '3.3mm';
    }

    function renderPage(tag) {
      const node = els.pageTemplate.content.firstElementChild.cloneNode(true);

      node.querySelector('[data-field="percent"]').textContent = tag.percent || '';
      node.querySelector('[data-field="modelLine"]').textContent = tag.model ? `MODEL : ${tag.model}` : 'MODEL :';
      node.querySelector('[data-field="descLine"]').textContent = tag.desc ? `DESCRIPTION : ${tag.desc}` : 'DESCRIPTION :';
      node.querySelector('[data-field="nowPrice"]').textContent = tag.nowPrice || '';
      node.querySelector('[data-field="beforeLine"]').textContent = tag.beforePrice ? `BEFORE : RM${tag.beforePrice}` : 'BEFORE :';

      fitLongPrice(node);
      fitPercent(node);
      fitDescription(node, tag.desc || '');

      return node;
    }

    function renderLivePreview() {
      els.livePreview.innerHTML = '';
      els.livePreview.appendChild(renderPage(getCurrentTag()));
    }

    function renderTagList() {
      els.tagCount.textContent = String(tags.length);
      els.tagList.innerHTML = '';

      if (!tags.length) {
        const empty = document.createElement('p');
        empty.className = 'hint';
        empty.textContent = 'No tag added yet.';
        els.tagList.appendChild(empty);
        return;
      }

      tags.forEach((tag, index) => {
        const item = document.createElement('div');
        item.className = 'tagItem';

        item.innerHTML = `
          <strong>${index + 1}. ${tag.model || '-'}</strong>
          <span>${tag.percent || '-'}% cashback · NOW RM${tag.nowPrice || '-'} · BEFORE RM${tag.beforePrice || '-'}</span>
          <div class="tagActions">
            <button class="secondary smallButton" type="button" data-action="edit" data-index="${index}">Edit</button>
            <button class="secondary smallButton" type="button" data-action="duplicate" data-index="${index}">Duplicate</button>
            <button class="danger smallButton" type="button" data-action="delete" data-index="${index}">Delete</button>
          </div>
        `;

        els.tagList.appendChild(item);
      });
    }

    function clearForm() {
      els.model.value = '';
      els.desc.value = '';
      els.percent.value = '';
      els.nowPrice.value = '';
      els.beforePrice.value = '';
      renderLivePreview();
      els.model.focus();
    }

    function addCurrentTag() {
      const tag = getCurrentTag();
      if (!validateTag(tag)) return;
      tags.push(tag);
      renderTagList();
      clearForm();
    }

    function loadTagToForm(tag) {
      els.model.value = tag.model || '';
      els.desc.value = tag.desc || '';
      els.percent.value = tag.percent || '';
      els.nowPrice.value = tag.nowPrice || '';
      els.beforePrice.value = tag.beforePrice || '';
      renderLivePreview();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function preparePrintPages(mode) {
      let printTags = [];

      if (mode === 'current') {
        const tag = getCurrentTag();
        if (!validateTag(tag)) return false;
        printTags = [tag];
      } else {
        if (!tags.length) {
          const tag = getCurrentTag();
          if (!validateTag(tag)) return false;
          printTags = [tag];
        } else {
          printTags = tags;
        }
      }

      els.printBook.innerHTML = '';
      printTags.forEach(tag => els.printBook.appendChild(renderPage(tag)));
      return true;
    }

    function printPages(mode) {
      if (!preparePrintPages(mode)) return;
      setTimeout(() => window.print(), 80);
    }

    function updateZoom() {
      const value = Number(els.zoom.value);
      els.zoomValue.textContent = `${value}%`;
      els.previewScaler.style.transform = `scale(${value / 100})`;
      els.previewScaler.style.width = `${210 * value / 100}mm`;
      els.previewScaler.style.height = `${297 * value / 100}mm`;
    }

    function updateTagFont() {
      document.documentElement.style.setProperty('--tag-font', els.tagFont.value);
    }

    [els.model, els.desc, els.percent, els.nowPrice, els.beforePrice].forEach(input => {
      input.addEventListener('input', renderLivePreview);
    });

    els.addBtn.addEventListener('click', addCurrentTag);
    els.clearFormBtn.addEventListener('click', clearForm);
    els.printCurrentBtn.addEventListener('click', () => printPages('current'));
    els.printAllBtn.addEventListener('click', () => printPages('all'));
    els.zoom.addEventListener('input', updateZoom);
    els.tagFont.addEventListener('change', updateTagFont);

    els.tagList.addEventListener('click', event => {
      const btn = event.target.closest('button[data-action]');
      if (!btn) return;

      const index = Number(btn.dataset.index);
      const action = btn.dataset.action;
      const tag = tags[index];

      if (!tag) return;

      if (action === 'edit') {
        loadTagToForm(tag);
        tags.splice(index, 1);
        renderTagList();
      }

      if (action === 'duplicate') {
        tags.splice(index + 1, 0, { ...tag });
        renderTagList();
      }

      if (action === 'delete') {
        tags.splice(index, 1);
        renderTagList();
      }
    });

    renderLivePreview();
    renderTagList();
    updateZoom();
    updateTagFont();
  </script>
</body>
</html>
